<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Job Autofill</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 12px 14px;
      min-width: 240px;
      font-size: 13px;
      color: #334155;
      background: #f8fafc;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 15px;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    button {
      display: block;
      width: 100%;
      margin: 0 0 8px;
      padding: 10px 12px;
      cursor: pointer;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      background: #fff;
      font-weight: 600;
      font-size: 13px;
      color: #475569;
    }
    button:hover:not(:disabled) {
      background: #f1f5f9;
    }
    button.primary {
      background: linear-gradient(135deg, #6366f1, #818cf8);
      color: #fff;
      border: none;
      box-shadow: 0 2px 8px rgba(99, 102, 241, 0.25);
    }
    button.primary:hover:not(:disabled) {
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.35);
    }
    .help {
      font-size: 11px;
      color: #64748b;
      margin: 4px 0 0;
      line-height: 1.4;
    }
    .error {
      color: #dc2626;
      font-size: 11px;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <h1>Job Autofill</h1>
  <button type="button" class="primary" id="btnOpenPanel">Open panel on this page</button>
  <button type="button" id="btnSettings">Edit profile &amp; settings</button>
  <p class="help">The panel opens on the active tab. Refresh the page if the extension was just installed.</p>
  <p class="error" id="errLine" hidden></p>
  <script src="toolbar_popup.js"></script>
</body>
</html>
